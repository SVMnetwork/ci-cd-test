name: data-pipeline-ci-cd

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  cd:
    name: Build and upload deployment artifact
    runs-on: ubuntu-latest
    needs: ci

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data pipeline
        run: python -m pipeline.run_pipeline

      - name: Package deployment files
        run: |
          mkdir -p deploy
          cp -r pipeline deploy/
          cp -r data deploy/
          cp requirements.txt deploy/
          cp -r dist deploy/
          tar -czf data-pipeline-demo.tar.gz deploy

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-pipeline-demo
          path: data-pipeline-demo.tar.gz
          retention-days: 7